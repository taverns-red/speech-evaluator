<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - AI Speech Evaluator</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#C13B3B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .login-header {
      text-align: center;
    }

    .login-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .login-header h1 span {
      color: var(--red-primary);
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Let Clerk's own component handle all card styling */
    #clerk-sign-in {
      width: 100%;
      max-width: 400px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-error {
      background: rgba(193, 59, 59, 0.1);
      border: 1px solid var(--red-primary);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--red-primary);
      font-size: 0.85rem;
      max-width: 400px;
      display: none;
      text-align: center;
    }

    .login-error.visible {
      display: block;
    }

    .login-loading {
      color: var(--text-muted);
      text-align: center;
      font-size: 0.85rem;
    }

    .login-footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <h1><span>AI</span> Speech Evaluator</h1>
      <p>Sign in to continue</p>
    </div>

    <div id="clerk-sign-in">
      <div class="login-loading">Loading authentication...</div>
    </div>

    <div class="login-error" id="login-error"></div>

    <div class="login-footer">
      <a href="https://taverns.red" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);text-decoration:none;">
        <img src="/logo-taverns.png" alt="Red Taverns" style="width:16px;height:16px;border-radius:3px;opacity:0.7;">
        A Red Taverns Production
      </a>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
