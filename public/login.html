<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - AI Speech Evaluator</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .login-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .login-card h1 span {
      color: var(--red-primary);
    }

    .login-subtitle {
      color: var(--text-muted);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .login-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      background: var(--bg-elevated, #252230);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-login:hover {
      background: var(--bg-card);
      border-color: var(--red-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(193, 59, 59, 0.15);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .login-error {
      background: rgba(193, 59, 59, 0.1);
      border: 1px solid var(--red-primary);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--red-primary);
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
      text-align: center;
    }

    .login-error.visible {
      display: block;
    }

    .login-loading {
      color: var(--text-muted);
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      display: none;
    }

    .login-loading.visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <h1><span>AI</span> Speech Evaluator</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <div class="login-buttons">
        <button class="btn-login" id="btn-google" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Continue with Google
        </button>

        <button class="btn-login" id="btn-apple" onclick="signInWithApple()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" />
          </svg>
          Continue with Apple
        </button>

        <button class="btn-login" id="btn-github" onclick="signInWithGitHub()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="login-error" id="login-error"></div>
      <div class="login-loading" id="login-loading">Signing in...</div>
    </div>

    <div class="login-footer">
      <a href="https://taverns.red" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);text-decoration:none;">
        <img src="/logo-taverns.png" alt="Red Taverns" style="width:16px;height:16px;border-radius:3px;opacity:0.7;">
        A Red Taverns Production
      </a>
    </div>
  </div>

  <!-- Firebase SDK (compat mode for simplicity — no build step) -->
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
  <script src="login.js"></script>
</body>

</html>
